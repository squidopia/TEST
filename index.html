<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Journey - P1</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    overflow: hidden;
}

/* TITLE */
h1 {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    font-size: 2.2rem;
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
}

/* CANVAS */
#gameCanvas {
    display: block;
    margin: 80px auto 0;
    background: #020617;
    border: 2px solid #334155;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
    border-radius: 8px;
}

/* HUD */
#hud {
    position: absolute;
    top: 90px;
    left: 20px;
    background: rgba(15, 23, 42, 0.75);
    padding: 12px 16px;
    border-radius: 10px;
    border: 1px solid rgba(148,163,184,0.3);
    backdrop-filter: blur(6px);
    font-size: 14px;
    line-height: 1.5;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}

/* WIN SCREEN */
#winScreen {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(15, 23, 42, 0.9);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    display: none;
    border: 1px solid #22c55e;
    box-shadow: 0 0 30px rgba(34,197,94,0.4);
}

/* CRASH SCREEN */
#crashScreen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255,0,0,0.15);
    backdrop-filter: blur(4px);
    display: none;
    z-index: 999;
}
</style>
</head>

<body>

<h1>The Journey - P1</h1>

<div id="hud">
    <div id="orbsText">Orbs: 0/15</div>
    <div id="buildText">Build Charges: 1</div>
</div>

<canvas id="gameCanvas" width="1000" height="500"></canvas>

<div id="winScreen">
    <h2>✨ You did it.</h2>
    <p>Secret Code:</p>
    <code>!K32NjM.S[E/p@</code>
</div>

<div id="crashScreen"></div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const crashScreen = document.getElementById("crashScreen");

let player = {
    x: 50,
    y: 400,
    w: 20,
    h: 20,
    vx: 0,
    vy: 0,
    grounded: false
};

let gravity = 0.6;
let keys = {};
let cameraX = 0;

let orbsCollected = 0;
let buildCharges = 1;

let worldWidth = 4000;
let dead = false;

// ==========================
// PLATFORMS
// ==========================
let platforms = [];
for (let i = 0; i < 100; i++) {
    platforms.push({ x: i * 50, y: 450, w: 50, h: 50 });
}

for (let i = 0; i < 50; i++) {
    platforms.push({
        x: Math.random() * worldWidth,
        y: Math.random() * 350,
        w: 100,
        h: 20
    });
}

// ==========================
function rectCollision(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
}

function isInsidePlatform(x, y, size) {
    return platforms.some(p =>
        rectCollision({x, y, w:size, h:size}, p)
    );
}

// ==========================
// ORBS
// ==========================
const ORB_SIZE = 24;

function getSafeOrb() {
    let tries = 0;
    while (tries < 1000) {
        let orb = {
            x: Math.random() * worldWidth,
            y: Math.random() * 350,
            collected: false
        };
        if (!isInsidePlatform(orb.x, orb.y, ORB_SIZE)) return orb;
        tries++;
    }
    return { x: 100, y: 100, collected: false };
}

let orbs = [];
for (let i = 0; i < 15; i++) orbs.push(getSafeOrb());

// ==========================
let killbricks = [];
for (let i = 0; i < 20; i++) {
    killbricks.push({
        x: Math.random() * worldWidth,
        y: Math.random() * 400,
        w: 40,
        h: 40,
        dir: Math.random() > 0.5 ? 1 : -1
    });
}

// ==========================
let redOrb = null;
setInterval(() => {
    if (!dead) {
        let temp;
        let tries = 0;
        do {
            temp = {
                x: Math.random() * worldWidth,
                y: Math.random() * 350
            };
            tries++;
        } while (isInsidePlatform(temp.x, temp.y, 15) && tries < 1000);

        redOrb = temp;
    }
}, 10000);

// ==========================
function die() {
    dead = true;
    crashScreen.style.display = "block";
}

// ==========================
function update() {
    if (dead) return;

    if (keys["a"]) player.vx = -5;
    else if (keys["d"]) player.vx = 5;
    else player.vx = 0;

    if (keys["w"] && player.grounded) {
        player.vy = -12;
        player.grounded = false;
    }

    player.vy += gravity;
    player.x += player.vx;

    platforms.forEach(p => {
        if (rectCollision(player, p)) {
            if (player.vx > 0) player.x = p.x - player.w;
            if (player.vx < 0) player.x = p.x + p.w;
        }
    });

    player.y += player.vy;

    player.grounded = false;
    platforms.forEach(p => {
        if (rectCollision(player, p)) {
            if (player.vy > 0) {
                player.y = p.y - player.h;
                player.vy = 0;
                player.grounded = true;
            } else if (player.vy < 0) {
                player.y = p.y + p.h;
                player.vy = 0;
            }
        }
    });

    killbricks.forEach(k => {
        k.x += k.dir * 2;
        if (k.x < 0 || k.x > worldWidth) k.dir *= -1;
        if (rectCollision(player, k)) die();
    });

    orbs.forEach(o => {
        if (!o.collected && rectCollision(player, {x:o.x,y:o.y,w:ORB_SIZE,h:ORB_SIZE})) {
            o.collected = true;
            orbsCollected++;
        }
    });

    if (redOrb && rectCollision(player, {x:redOrb.x,y:redOrb.y,w:15,h:15})) {
        buildCharges++;
        redOrb = null;
    }

    document.getElementById("orbsText").innerText = `Orbs: ${orbsCollected}/15`;
    document.getElementById("buildText").innerText = `Build Charges: ${buildCharges}`;

    if (orbsCollected >= 15) {
        document.getElementById("winScreen").style.display = "block";
    }

    cameraX = player.x - 200;
}

// ==========================
canvas.addEventListener("click", e => {
    if (buildCharges > 0 && !dead) {
        let rect = canvas.getBoundingClientRect();
        let x = e.clientX - rect.left + cameraX;
        let y = e.clientY - rect.top;
        platforms.push({ x: x - 40, y: y - 10, w: 80, h: 20 });
        buildCharges--;
    }
});

// ==========================
function draw() {
    if (dead) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-cameraX, 0);

    ctx.fillStyle = "#334155";
    platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

    ctx.fillStyle = "red";
    killbricks.forEach(k => ctx.fillRect(k.x, k.y, k.w, k.h));

    ctx.fillStyle = "cyan";
    orbs.forEach(o => {
        if (!o.collected) {
            ctx.beginPath();
            ctx.arc(o.x, o.y, 7, 0, Math.PI*2);
            ctx.fill();
        }
    });

    if (redOrb) {
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(redOrb.x, redOrb.y, 7, 0, Math.PI*2);
        ctx.fill();
    }

    ctx.fillStyle = "white";
    ctx.fillRect(player.x, player.y, player.w, player.h);

    ctx.restore();

    // TEXT FIX 🔥
    ctx.fillStyle = "white";
    ctx.font = "16px Arial";
    ctx.fillText("Orbs: " + orbsCollected + "/15", 20, 20);
    ctx.fillText("Build Charges: " + buildCharges, 20, 45);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

loop();
</script>

</body>
</html>
